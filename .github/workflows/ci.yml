name: CI

on:
  pull_request:
  push:

jobs:
  verify:
    name: lint-test-typecheck-build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
